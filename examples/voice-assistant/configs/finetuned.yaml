# Fine-tuned-mode eval config.
#
# Evaluates the fine-tuned fork of LFM2.5-Audio-1.5B on OHF-Voice.
#
# system_prompt is set to "Perform ASR." for two reasons:
# - The llama-liquid-audio-server only accepts a closed set of approved
#   system strings; null or arbitrary content gets rejected.
# - The base LFM2.5-Audio model was pre-trained on this exact behavioral
#   switch as "audio in, text out", so it activates the audio-to-text
#   pathway. The fine-tune trained on top biases what text the model emits
#   (now: function calls) without contradicting that mode signal.
#
# model_repo + quant are placeholders until the fine-tune is published;
# update both after scripts/quantize.py pushes
# Paulescu/LFM2.5-Audio-1.5B-OHF-Voice-GGUF.

name: finetuned
model_repo: Paulescu/LFM2.5-Audio-1.5B-OHF-Voice-GGUF
quant: Q8_0

system_prompt: "Perform ASR."

samples_per_function: 10
max_new_tokens: 64
temperature: 0.0
port: 8080
