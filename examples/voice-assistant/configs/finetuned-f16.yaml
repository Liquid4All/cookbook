# Fine-tuned-mode eval config (F16 quant).
#
# Evaluates the F16 GGUF of the fine-tuned LFM2.5-Audio-1.5B on OHF-Voice.
# Numbers for this quant are not measured yet; rerun scripts/eval.py against
# this file to populate the reference table in the README.
#
# system_prompt is set to "Perform ASR." for two reasons:
# - The llama-liquid-audio-server only accepts a closed set of approved
#   system strings; null or arbitrary content gets rejected.
# - The base LFM2.5-Audio model was pre-trained on this exact behavioral
#   switch as "audio in, text out", and our fine-tune trained with the same
#   system message in place, so the runtime path matches the training shape.

name: finetuned-f16
model_repo: Paulescu/LFM2.5-Audio-1.5B-OHF-Voice-GGUF
quant: F16

system_prompt: "Perform ASR."

samples_per_function: 10
max_new_tokens: 64
temperature: 0.0
port: 8080
