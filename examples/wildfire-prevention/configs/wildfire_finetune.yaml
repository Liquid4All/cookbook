project_name: "wildfire-prevention"
model_name: "lfm2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "./data/wildfire/wildfire_train.jsonl"
  type: "vlm_sft"
  test_size: 0.0
  image_root: "./data/wildfire/images"
  # limit: 100  # uncomment for quick testing

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  seed: 42
  eval_on_start: true
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 5

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: true

benchmarks:
  image_root: "./data/wildfire/images"
  benchmarks:
    - name: "wildfire_eval"
      path: "./data/wildfire/wildfire_test.jsonl"
      metric: "short_answer"
      max_new_tokens: 256
