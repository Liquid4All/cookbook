project_name: "wildfire-prevention"
model_name: "lfm2.5-VL-450M"
training_type: "vlm_sft"

dataset:
  path: "/outputs/data/wildfire/wildfire_train.jsonl"
  type: "vlm_sft"
  image_root: "/outputs/data/wildfire/images"

training_config:
  extends: "DEFAULT_VLM_SFT"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-5
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  seed: 42
  eval_on_start: true
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_steps: 5
  tracker: "trackio"
  trackio_space_id: "Paulescu/wildfire-prevention-finetune"

peft_config:
  extends: "DEFAULT_VLM_LORA"
  use_peft: false

benchmarks:
  image_root: "/outputs/data/wildfire/images"
  benchmarks:
    - name: "wildfire_eval"
      path: "/outputs/data/wildfire/wildfire_test.jsonl"
      metric: "short_answer"
      max_new_tokens: 256

modal:
  app_name: "wildfire-prevention"
  gpu: "H100:1"
  timeout: 7200
  output_volume: "wildfire-prevention"
  output_dir: "/outputs"
  detach: false
