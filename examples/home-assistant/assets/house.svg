<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <!-- House base / walls -->
  <rect x="60" y="140" width="280" height="150" fill="#e8dcc8" stroke="#b0a090" stroke-width="2"/>

  <!-- Roof -->
  <polygon points="40,140 200,40 360,140" fill="#c0392b" stroke="#922b21" stroke-width="2"/>

  <!-- Door -->
  <rect x="165" y="220" width="50" height="70" rx="4" fill="#7d5a3c" stroke="#5d3d1e" stroke-width="1.5"/>
  <circle cx="208" cy="257" r="3" fill="#f0c040"/>

  <!-- Window: kitchen (left) -->
  <g id="kitchen-window">
    <rect x="80" y="165" width="60" height="50" rx="3" fill="#aed6f1" stroke="#7fb3d3" stroke-width="1.5"/>
    <line x1="110" y1="165" x2="110" y2="215" stroke="#7fb3d3" stroke-width="1"/>
    <line x1="80" y1="190" x2="140" y2="190" stroke="#7fb3d3" stroke-width="1"/>
  </g>

  <!-- Window: living room (right) -->
  <g id="living-room-window">
    <rect x="260" y="165" width="60" height="50" rx="3" fill="#aed6f1" stroke="#7fb3d3" stroke-width="1.5"/>
    <line x1="290" y1="165" x2="290" y2="215" stroke="#7fb3d3" stroke-width="1"/>
    <line x1="260" y1="190" x2="320" y2="190" stroke="#7fb3d3" stroke-width="1"/>
  </g>

  <!-- Bedroom (attic window in roof) -->
  <g id="bedroom-window">
    <rect x="172" y="90" width="56" height="38" rx="3" fill="#aed6f1" stroke="#7fb3d3" stroke-width="1.5"/>
    <line x1="200" y1="90" x2="200" y2="128" stroke="#7fb3d3" stroke-width="1"/>
    <line x1="172" y1="109" x2="228" y2="109" stroke="#7fb3d3" stroke-width="1"/>
  </g>

  <!-- Light overlays (colored rects, toggled by JS) -->
  <rect id="kitchen"     x="80"  y="165" width="60" height="50" rx="3" fill="transparent" class="room-overlay"/>
  <rect id="living-room" x="260" y="165" width="60" height="50" rx="3" fill="transparent" class="room-overlay"/>
  <rect id="bedroom"     x="172" y="90"  width="56" height="38" rx="3" fill="transparent" class="room-overlay"/>

  <!-- Chimney -->
  <rect x="270" y="60" width="28" height="55" fill="#b0a090" stroke="#8c7a6a" stroke-width="1.5"/>

  <!-- Ground -->
  <rect x="0" y="290" width="400" height="30" fill="#7dba6a"/>
  <rect x="60" y="288" width="280" height="4" fill="#5a9a4a"/>
</svg>
