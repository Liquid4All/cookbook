name: VerizonSupportPOC
options:
  bundleIdPrefix: ai.liquid.demos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# This cookbook example vendors the shared LFMEngine source files directly
# into the app target instead of linking a local Swift package product. That
# keeps the example self-contained and avoids Xcode package-product resolution
# failures when the folder is copied out of a larger workspace.
#
# LeapSDK is Liquid's edge runtime. The optional audio pack uses it for
# audio-token inference, while the text pipeline keeps using llama.swift
# for local LoRA adapter loading and hot-swap.
packages:
  llama.swift:
    url: https://github.com/mattt/llama.swift.git
    exactVersion: "2.8851.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    exactVersion: "2.30.6"
  LeapSDK:
    url: https://github.com/Liquid4All/leap-ios.git
    from: "0.9.4"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "21"
    CODE_SIGN_STYLE: Automatic

targets:
  VerizonSupportPOC:
    type: application
    platform: iOS
    sources:
      # Ship local GGUFs in the app bundle at `Resources/Models/` after
      # running bootstrap-models.sh. The cookbook keeps those large files
      # out of git.
      - path: VerizonSupportPOC
      - path: Packages/LFMEngine/Sources/LFMEngine
        name: LFMEngine
        group: SharedPackages
        createIntermediateGroups: false
    dependencies:
      - package: llama.swift
        product: LlamaSwift
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: LeapSDK
        product: LeapSDK
    info:
      path: VerizonSupportPOC/Info.plist
      properties:
        CFBundleIconName: AppIcon
        CFBundleDisplayName: Telco Triage
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: "Telco Triage uses your microphone for on-device voice support; your audio never leaves the phone in Phase 1."
        NSSpeechRecognitionUsageDescription: "Voice queries are transcribed on-device and answered from the local knowledge base."
        NSCameraUsageDescription: "Take a photo of your router lights or bill and Telco Triage analyzes it on-device."
        NSPhotoLibraryUsageDescription: "Pick a photo of your router, bill, or error screen for on-device analysis."
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleDefault
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.liquid.demos.telcotriage
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) LLAMA_CPP_AVAILABLE"

  VerizonSupportPOCTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VerizonSupportPOCTests
    dependencies:
      - target: VerizonSupportPOC
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VerizonSupportPOC.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VerizonSupportPOC"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  VerizonSupportPOC:
    build:
      targets:
        VerizonSupportPOC: all
        VerizonSupportPOCTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VerizonSupportPOCTests
