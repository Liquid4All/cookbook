model: claude-sonnet-4-6
dataset: Paulescu/defect-detection
split: test
n_samples: 50
source: GoodsAD
wandb_project_name: defect-detection-benchmark
prompt_override: >-
  You are a quality control inspector. Examine this product image carefully
  and determine whether it has any visible defects, including scratches,
  dents, stains, discoloration, cracks, or surface damage. Respond with
  only Yes or No.
